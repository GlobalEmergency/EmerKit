name: Build & Deploy iOS

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build & Submit to App Store
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          VERSION="${{ inputs.version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -o '"version": *"[^"]*"' version.json | grep -o '"[^"]*"$' | tr -d '"')
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (build: $BUILD_NUMBER)"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ios-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ios-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # Install certificate and provisioning profile (same pattern as DeaMap)
      - name: Install Apple certificate and provisioning profile
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Install provisioning profile
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
            <<< "$(security cms -D -i "$PROFILE_PATH")")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Configure iOS project for distribution
        run: |
          cd ios
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.build_number }}" Runner/Info.plist
          cd ..
          bash scripts/configure-ios-signing.sh

      - name: Build Flutter iOS
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Xcode Archive
        run: |
          cd ios
          # Signing is configured in Runner.xcodeproj (not as xcodebuild args)
          # This prevents signing settings from leaking to Pods targets
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

          echo "✅ Archive created"
          ls -la ../build/ios/archive/Runner.xcarchive/

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>online.globalemergency.emerkit</key>
              <string>${PROVISIONING_PROFILE_UUID}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Install API key for export
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          mkdir -p ~/private_keys
          echo "$API_KEY" > ~/private_keys/AuthKey_${KEY_ID}.p8

          cd ios
          xcodebuild -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportPath ../build/ios/ipa \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -allowProvisioningUpdates

          echo "✅ IPA exported and uploaded to App Store Connect"

      - name: Install Python dependencies for App Store Connect API
        run: pip3 install --break-system-packages PyJWT requests

      - name: Submit to App Review
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build_number }}
        run: |
          # Install API key for altool/notarytool
          mkdir -p ~/private_keys
          echo "$API_KEY" > ~/private_keys/AuthKey_${KEY_ID}.p8

          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build_number }}"

          echo "⏳ Waiting for build $VERSION ($BUILD) to finish processing..."
          # App Store Connect needs time to process the uploaded build
          for i in $(seq 1 30); do
            sleep 30
            # Use xcrun to check build processing status
            BUILD_STATUS=$(xcrun altool --list-builds \
              --apiKey "$KEY_ID" \
              --apiIssuer "$ISSUER_ID" \
              --output-format json 2>/dev/null | \
              python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              builds = data.get('builds', [])
              for b in builds:
                  if b.get('buildVersion') == '$BUILD':
                      print(b.get('processingState', 'unknown'))
                      sys.exit(0)
              print('not_found')
          except:
              print('error')
          " 2>/dev/null || echo "error")

            echo "  Attempt $i/30: status=$BUILD_STATUS"
            if [ "$BUILD_STATUS" = "VALID" ] || [ "$BUILD_STATUS" = "valid" ]; then
              echo "✅ Build processing complete"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "⚠️ Build still processing after 15 minutes, submitting anyway..."
            fi
          done

          # Submit for review using App Store Connect API via Python
          python3 << 'PYEOF'
          import json, time, jwt, requests, os, sys

          KEY_ID = os.environ["KEY_ID"]
          ISSUER_ID = os.environ["ISSUER_ID"]
          key_path = os.path.expanduser(f"~/private_keys/AuthKey_{KEY_ID}.p8")

          with open(key_path, "r") as f:
              private_key = f.read()

          # Generate JWT token
          now = int(time.time())
          payload = {
              "iss": ISSUER_ID,
              "iat": now,
              "exp": now + 1200,
              "aud": "appstoreconnect-v1"
          }
          token = jwt.encode(payload, private_key, algorithm="ES256", headers={"kid": KEY_ID})
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          base = "https://api.appstoreconnect.apple.com/v1"

          # Find the app
          r = requests.get(f"{base}/apps?filter[bundleId]=online.globalemergency.emerkit", headers=headers)
          r.raise_for_status()
          app_id = r.json()["data"][0]["id"]
          print(f"App ID: {app_id}")

          # Get the latest build (just uploaded)
          version = os.environ.get("VERSION", "")
          build_num = os.environ.get("BUILD", "")
          r = requests.get(
              f"{base}/builds?filter[app]={app_id}&filter[version]={build_num}&sort=-uploadedDate&limit=1",
              headers=headers
          )
          r.raise_for_status()
          builds = r.json()["data"]
          if not builds:
              print("⚠️ Build not found yet in App Store Connect, skipping auto-submit")
              sys.exit(0)

          build_id = builds[0]["id"]
          processing = builds[0]["attributes"].get("processingState", "unknown")
          print(f"Build ID: {build_id}, processing: {processing}")

          # Get or create the app store version
          r = requests.get(
              f"{base}/apps/{app_id}/appStoreVersions?filter[appStoreState]=READY_FOR_SALE,PREPARE_FOR_SUBMISSION,WAITING_FOR_REVIEW,IN_REVIEW,DEVELOPER_REJECTED&limit=1",
              headers=headers
          )
          r.raise_for_status()
          versions = r.json()["data"]

          if versions and versions[0]["attributes"]["appStoreState"] == "PREPARE_FOR_SUBMISSION":
              version_id = versions[0]["id"]
              print(f"Using existing version: {version_id}")
          else:
              # Create new version
              r = requests.post(f"{base}/appStoreVersions", headers=headers, json={
                  "data": {
                      "type": "appStoreVersions",
                      "attributes": {"platform": "IOS", "versionString": version},
                      "relationships": {"app": {"data": {"type": "apps", "id": app_id}}}
                  }
              })
              r.raise_for_status()
              version_id = r.json()["data"]["id"]
              print(f"Created version: {version_id}")

          # Attach build to version
          r = requests.patch(f"{base}/appStoreVersions/{version_id}/relationships/build", headers=headers, json={
              "data": {"type": "builds", "id": build_id}
          })
          if r.ok:
              print(f"✅ Build {build_id} attached to version {version_id}")
          else:
              print(f"⚠️ Could not attach build: {r.status_code} {r.text}")

          # Submit for review
          r = requests.post(f"{base}/appStoreVersionSubmissions", headers=headers, json={
              "data": {
                  "type": "appStoreVersionSubmissions",
                  "relationships": {
                      "appStoreVersion": {"data": {"type": "appStoreVersions", "id": version_id}}
                  }
              }
          })
          if r.ok:
              print(f"✅ Submitted version {version} for App Review!")
          else:
              print(f"⚠️ Could not submit for review: {r.status_code} {r.text}")
              print("You may need to submit manually from App Store Connect")
          PYEOF

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
