name: Build & Deploy iOS

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          VERSION="${{ inputs.version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -o '"version": *"[^"]*"' version.json | grep -o '"[^"]*"$' | tr -d '"')
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (build: $BUILD_NUMBER)"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ios-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ios-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Install App Store Connect API Key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          mkdir -p ~/private_keys
          echo "$API_KEY" > ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Configure iOS project for distribution
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios
          # Update version
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.build_number }}" Runner/Info.plist

          # Configure Runner.xcodeproj for manual distribution signing
          ruby -e '
            pbx = File.read("Runner.xcodeproj/project.pbxproj")
            pbx.gsub!(/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/, "PRODUCT_BUNDLE_IDENTIFIER = online.globalemergency.emerkit;")
            pbx.gsub!(/DEVELOPMENT_TEAM = [^;]*;/, "DEVELOPMENT_TEAM = '"$TEAM_ID"';")
            pbx.gsub!(/CODE_SIGN_STYLE = [^;]*;/, "CODE_SIGN_STYLE = Automatic;")
            File.write("Runner.xcodeproj/project.pbxproj", pbx)
          '

      - name: Build Flutter iOS
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Xcode Archive
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            -IDEBuildOperationTimingLogLevel=0

          echo "✅ Archive created"
          ls -la ../build/ios/archive/Runner.xcarchive/

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ../build/ios/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

          echo "✅ IPA exported"
          ls -la ../build/ios/ipa/

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight != false }}
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_FILE=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "❌ No IPA file found"
            exit 1
          fi
          echo "📦 Uploading: $IPA_FILE"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload IPA to Release
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IPA=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            gh release upload "${{ steps.version.outputs.tag }}" "$IPA" --clobber || echo "⚠️ Could not attach to release"
          fi
