name: Build & Deploy iOS

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          VERSION="${{ inputs.version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -o '"version": *"[^"]*"' version.json | grep -o '"[^"]*"$' | tr -d '"')
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (build: $BUILD_NUMBER)"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ios-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ios-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # Install the App Store Connect API key for automatic signing
      - name: Install App Store Connect API Key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          mkdir -p ~/private_keys
          echo "$API_KEY" > ~/private_keys/AuthKey_${KEY_ID}.p8

      # Configure the Xcode project for automatic signing
      - name: Configure iOS project
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios

          # Set bundle ID and team
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = online.globalemergency.emerkit;/g" Runner.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = ${TEAM_ID};/g" Runner.xcodeproj/project.pbxproj

          # Enable automatic signing
          sed -i '' "s/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g" Runner.xcodeproj/project.pbxproj

          # Ensure automatic signing is set (add if not present)
          ruby -e '
            pbx = File.read("Runner.xcodeproj/project.pbxproj")
            # Ensure CODE_SIGN_STYLE = Automatic for all targets
            pbx.gsub!(/CODE_SIGN_STYLE = .*;/, "CODE_SIGN_STYLE = Automatic;")
            File.write("Runner.xcodeproj/project.pbxproj", pbx)
          '

          # Update version in Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.build_number }}" Runner/Info.plist

      # Build using xcodebuild directly with API key authentication
      - name: Build iOS Archive
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # First, build the Flutter assets
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

          cd ios

          # Archive with API key for automatic signing
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            | tail -20

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ../build/ios/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            | tail -10

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight != false }}
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun notarytool store-credentials "AC_PASSWORD" \
            --key ~/private_keys/AuthKey_${KEY_ID}.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" 2>/dev/null || true

          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload IPA to Release
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IPA=$(ls build/ios/ipa/*.ipa 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            gh release upload "${{ steps.version.outputs.tag }}" "$IPA" --clobber || echo "⚠️ Could not attach to release"
          fi
