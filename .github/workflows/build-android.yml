name: Build & Deploy Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      android_track:
        description: 'Google Play track'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Extract version from version.json
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -o '"version": *"[^"]*"' version.json | grep -o '"[^"]*"$' | tr -d '"')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (build: $BUILD_NUMBER)"

      # Propagate version to pubspec.yaml
      - name: Propagate version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build_number }}"
          sed -i "s/^version: .*/version: $VERSION+$BUILD/" pubspec.yaml
          echo "✅ pubspec.yaml -> $VERSION+$BUILD"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # Decode keystore from base64 secret
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/emerkit-release.jks

      # Create key.properties from secrets
      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=emerkit-release.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ steps.version.outputs.build_number }}

      - name: Build release AAB (Google Play)
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ steps.version.outputs.build_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      # Deploy to Google Play
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: online.globalemergency.emerkit
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.android_track || 'internal' }}
          status: completed
          releaseName: ${{ steps.version.outputs.version }}

      # Attach APK to existing GitHub Release
      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            build/app/outputs/flutter-apk/app-release.apk \
            --clobber || echo "⚠️ Could not attach to release"
