name: Build & Deploy Android

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      android_track:
        description: 'Google Play track'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          VERSION="${{ inputs.version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -o '"version": *"[^"]*"' version.json | grep -o '"[^"]*"$' | tr -d '"')
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "đź“¦ Version: $VERSION (build: $BUILD_NUMBER)"

      - name: Propagate version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub & Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*') }}
          restore-keys: android-

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/emerkit-release.jks

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=emerkit-release.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ steps.version.outputs.build_number }}

      - name: Build release AAB
        run: flutter build appbundle --release --build-name=${{ steps.version.outputs.version }} --build-number=${{ steps.version.outputs.build_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: online.globalemergency.emerkit
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.android_track || 'internal' }}
          status: completed
          releaseName: ${{ steps.version.outputs.version }}

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            build/app/outputs/flutter-apk/app-release.apk \
            --clobber || echo "âš ď¸Ź Could not attach to release"
