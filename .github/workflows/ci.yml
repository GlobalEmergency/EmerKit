name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Analyze, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version check (PRs only)
      - name: Check version bumped
        if: github.event_name == 'pull_request'
        run: |
          bash scripts/propagate-version.sh --check

          # Check if app code was changed (lib/, assets/, pubspec.yaml, pubspec.lock)
          git fetch origin ${{ github.base_ref }} --depth=1
          APP_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- lib/ assets/ pubspec.yaml pubspec.lock | head -1)

          if [ -z "$APP_CHANGES" ]; then
            echo "ℹ️ No app code changes detected — version bump not required"
            exit 0
          fi

          PR_VERSION=$(grep -o '"version": *"[^"]*"' version.json | grep -o '"[^"]*"$' | tr -d '"')
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:version.json 2>/dev/null | grep -o '"version": *"[^"]*"' | grep -o '"[^"]*"$' | tr -d '"' || echo "0.0.0")

          echo "Base: $BASE_VERSION -> PR: $PR_VERSION"
          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "❌ ERROR: version.json has not been bumped ($BASE_VERSION -> $PR_VERSION)"
            echo "This PR changes app code. Please bump the version in version.json."
            exit 1
          else
            echo "✅ Version bumped: $BASE_VERSION -> $PR_VERSION"
          fi

      # Setup
      - uses: actions/setup-java@v4
        if: github.event_name == 'push'
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Cache pub dependencies
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # Build only on push to main (not on PRs - saves ~2 min)
      - name: Cache Gradle
        if: github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        if: github.event_name == 'push'
        run: flutter build apk --debug
