name: "Bug Report / Reporte de Bug"
description: "Reporta un error en EmerKit / Report a bug in EmerKit"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar este bug. Por favor, completa la informacion a continuacion.
        Thank you for reporting this bug. Please fill in the information below.

  - type: textarea
    id: description
    attributes:
      label: "Descripcion / Description"
      description: "Describe el bug de forma clara / Clearly describe the bug"
      placeholder: "Cuando abro la calculadora de Glasgow y selecciono... / When I open the Glasgow calculator and select..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Pasos para reproducir / Steps to Reproduce"
      description: "Pasos detallados para reproducir el error / Detailed steps to reproduce the bug"
      placeholder: |
        1. Abrir la app / Open the app
        2. Ir a... / Go to...
        3. Pulsar en... / Tap on...
        4. Ver error / See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Comportamiento esperado / Expected Behavior"
      description: "Que deberia ocurrir / What should happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Comportamiento actual / Actual Behavior"
      description: "Que ocurre en realidad / What actually happens"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: "Plataforma / Platform"
      options:
        - Android
        - iOS
        - Web
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: "Version del SO / OS Version"
      description: "Ej: Android 14, iOS 17.2 / E.g.: Android 14, iOS 17.2"
      placeholder: "Android 14"
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: "Dispositivo / Device"
      description: "Modelo del dispositivo / Device model"
      placeholder: "Samsung Galaxy S24, iPhone 15..."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: "Capturas de pantalla / Screenshots"
      description: "Si es posible, adjunta capturas / If possible, attach screenshots"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: "Informacion adicional / Additional Information"
      description: "Cualquier otro contexto relevante / Any other relevant context"
    validations:
      required: false
