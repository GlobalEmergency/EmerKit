name: emerkit
description: EmerKit - Herramientas clinicas para profesionales de emergencias
publish_to: 'none'
version: 0.1.15+115

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  audioplayers: ^6.1.0
  url_launcher: ^6.3.1
  geolocator: ^14.0.2
  geocoding: ^3.0.0

dependency_overrides:
  # Pin to avoid objective_c native assets issue in Flutter 3.41.x iOS CI
  # See: https://github.com/flutter/flutter/issues/178915
  path_provider_foundation: 2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1B3A5C"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter_native_splash:
  color: "#1B3A5C"
  image: "assets/icons/app_icon.png"
  android_12:
    color: "#1B3A5C"
    image: "assets/icons/app_icon.png"
  ios: true
  web: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/icons/
    - assets/version.json
